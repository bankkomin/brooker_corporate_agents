# docker-compose.test.yml — test overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.test.yml up -d
services:
  paperclip:
    environment:
      - PAPERCLIP_API_KEY=test-api-key
      - LOG_LEVEL=debug

  email-notifier:
    environment:
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - agent-net
