global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'gateway'
    static_configs:
      - targets: ['gateway:3000']

  - job_name: 'cac-orchestrator'
    static_configs:
      - targets: ['cac-orchestrator:3001']

  - job_name: 'hr-orchestrator'
    static_configs:
      - targets: ['hr-orchestrator:3002']

  - job_name: 'reflection-engine'
    static_configs:
      - targets: ['reflection-engine:3008']

  - job_name: 'heartbeat'
    static_configs:
      - targets: ['heartbeat:3009']

  - job_name: 'eval-framework'
    static_configs:
      - targets: ['eval-framework:3030']

  - job_name: 'read-only-orchestrator'
    static_configs:
      - targets: ['read-only-orchestrator:3040']

  - job_name: 'rag-ingestion'
    static_configs:
      - targets: ['rag-ingestion:3004']

  - job_name: 'paperclip'
    static_configs:
      - targets: ['paperclip:3100']
