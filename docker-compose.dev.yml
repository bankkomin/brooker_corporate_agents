# docker-compose.dev.yml
# Local development overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Changes from production:
# - Data volumes use plain named volumes (no host bind mounts)
# - No vLLM required (nginx health check relaxed)
# - Debug logging enabled
# - Gateway hot-reload enabled

# Override data zone volumes for local dev.
# Production uses bind mounts to /data/ on the DGX Spark host. For dev we
# set MIRROR_PATH/STAGING_PATH/ARCHIVE_PATH in .env to repo-relative
# paths that Docker Desktop's WSL2 backend exposes, so the bind mount in
# the base compose works without /data/ existing on the host.
volumes:
  mirror_data:
    driver: local
  staging_data:
    driver: local
  archive_data:
    driver: local

services:
  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}

  minio:
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

  nginx:
    # In dev mode without vLLM, nginx will return 502 for /v1/* requests
    # This is expected — services should handle LLM errors gracefully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  qdrant:
    # Base file's healthcheck uses curl, which isn't in the qdrant image.
    # Use bash's /dev/tcp to probe the REST port instead.
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Slim python:3.11 images don't include curl. Healthcheck via python urllib.
  email-notifier:
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:3005/health',timeout=3).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  sync-back:
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:3006/health',timeout=3).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # deck-writer — composes pitch decks (python-pptx). Standalone service any
  # orchestrator can call via /compose. Also reachable from slack-bot router
  # under the [deck] prefix.
  deck-writer:
    build: ./services/deck-writer
    ports: ["3050:3050"]
    restart: unless-stopped
    networks: [agent-net]
    extra_hosts: ["host.docker.internal:host-gateway"]
    environment:
      VLLM_LARGE_URL: ${VLLM_LARGE_URL:-http://nginx:8080/v1}
      VLLM_LARGE_MODEL: ${VLLM_LARGE_MODEL:-qwen-large}
      LLM_API_KEY: ${LLM_API_KEY:-}
      RAG_INGESTION_URL: http://rag-ingestion:3004
      QDRANT_URL: http://qdrant:6333
      DEPARTMENTS_CONFIG: /app/config/departments.json
      # DECK_TEMPLATE_PATH intentionally unset — deck-writer picks per dept_id
      # from its internal _TEMPLATE_BY_DEPT map. Set this env var to force one
      # template for every request (e.g. for testing).
      DECK_OUTPUT_DIR: /data/decks
      RAG_TOP_K: ${RAG_TOP_K:-8}
      RAG_MIN_RELEVANCE: ${RAG_MIN_RELEVANCE:-0.35}
    volumes:
      - ./config:/app/config:ro
      - ./data/decks:/data/decks:rw
      - ./data/reports:/data/reports:rw
      - ./services/deck-writer/src:/app/src
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "3050", "--reload"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:3050/health',timeout=3).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # rag-ingestion uses the `vllm` embedder backend pointed at the host-native
  # embed server (scripts/embed_server.py), which runs google/embeddinggemma-300m
  # directly on the host RTX 4060 Ti — no Docker GPU passthrough needed.
  # Set EMBEDDER_TYPE=gemini in env to fall back to Gemini API.
  # Qdrant in server mode so chunks are shared with the orchestrators.
  rag-ingestion:
    environment:
      EMBEDDER_TYPE: ${EMBEDDER_TYPE:-vllm}
      VLLM_EMBED_URL: ${VLLM_EMBED_URL:-http://host.docker.internal:8765/v1}
      VLLM_EMBED_MODEL: ${VLLM_EMBED_MODEL:-local-gemma}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_EMBED_MODEL: ${GEMINI_EMBED_MODEL:-gemini-embedding-001}
      QDRANT_MODE: server
    volumes:
      - ./services/rag-ingestion/src:/app/src
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "3004", "--reload"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:3004/health',timeout=3).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  slack-bot:
    environment:
      LOG_LEVEL: DEBUG
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-xoxb-dev-token}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-dev-secret}
      CAC_CHANNEL_ID: ${CAC_CHANNEL_ID:-C0000000000}
      ESCALATIONS_CHANNEL_ID: ${ESCALATIONS_CHANNEL_ID:-C0000000001}
      APPROVALS_CHANNEL_ID: ${APPROVALS_CHANNEL_ID:-C0000000002}
      ORCHESTRATOR_ENABLED: ${ORCHESTRATOR_ENABLED:-false}
    volumes:
      - ./services/slack-bot/src:/app/src
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "3003", "--reload"]

  # Override gateway for dev: hot-reload + the whole services/ tree mounted
  # so the qualified imports (`services.gateway.src.X`) resolve. The base
  # Dockerfile only ships /app/src which breaks those imports — fine for
  # production once Dockerfile copies more, but dev wants live code anyway.
  gateway:
    environment:
      ENV: development
      LOG_LEVEL: DEBUG
      SLACK_BOT_URL: ${SLACK_BOT_URL:-http://slack-bot:3003}
      PYTHONPATH: /app
    volumes:
      - ./services:/app/services
    working_dir: /app
    command: ["uvicorn", "services.gateway.src.main:app", "--host", "0.0.0.0", "--port", "3000", "--reload", "--reload-dir", "/app/services/gateway"]

  # HR orchestrator — bring up live with the same Qwen flip + healthcheck
  # fixes as cac-orchestrator. Bind-mount src for hot-reload of the embed_fn
  # wiring (cloned from cac-orchestrator).
  hr-orchestrator:
    environment:
      VLLM_LARGE_URL: ${VLLM_LARGE_URL:-http://nginx:8080/v1}
      VLLM_LARGE_MODEL: ${VLLM_LARGE_MODEL:-qwen-large}
      LLM_API_KEY: ${LLM_API_KEY:-}
      RAG_INGESTION_URL: http://rag-ingestion:3004
      RAG_MIN_RELEVANCE: ${RAG_MIN_RELEVANCE:-0.35}
    volumes:
      - ./obsidian-vault:/vault:rw
      - ./services/hr-orchestrator/src:/app/src
      - ./services/shared:/app/services/shared:rw
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "3002", "--reload"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:3002/health',timeout=3).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Multi-tenant orchestrator for read-only depts (risk/legal/it/comms/ic/ib/ceo).
  # Loads depts from departments.json where capabilityTier=read_only AND live=true.
  # Base compose forgot to add networks → couldn't resolve postgres/qdrant.
  # Vault must be rw so pipeline can append daily logs.
  read-only-orchestrator:
    networks: [agent-net]
    environment:
      LLM_BASE_URL: ${VLLM_LARGE_URL:-http://nginx:8080/v1}
      LLM_MODEL: ${VLLM_LARGE_MODEL:-qwen-large}
      DEPARTMENTS_CONFIG: /app/config/departments.json
      SKILLS_ROOT: /skills
      VAULT_ROOT: /vault
      RAG_MIN_RELEVANCE: ${RAG_MIN_RELEVANCE:-0.35}
    volumes:
      - ./obsidian-vault:/vault:rw
      - ./services/read-only-orchestrator/src:/app/src
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "3040", "--reload"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:3040/health',timeout=3).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Point orchestrator at the DGX Qwen endpoint (base file hardcodes
  # http://nginx:8080/v1 which has no upstream vLLM in dev). Also mount
  # the obsidian-vault rw so the graph's vault writer can persist artifacts
  # to /vault/cac (default VAULT_ROOT). Bind-mount src for hot-reload.
  cac-orchestrator:
    environment:
      VLLM_LARGE_URL: ${VLLM_LARGE_URL:-http://nginx:8080/v1}
      VLLM_LARGE_MODEL: ${VLLM_LARGE_MODEL:-qwen-large}
      LLM_API_KEY: ${LLM_API_KEY:-}
      RAG_INGESTION_URL: http://rag-ingestion:3004
      RAG_MIN_RELEVANCE: ${RAG_MIN_RELEVANCE:-0.35}
    volumes:
      - ./obsidian-vault:/vault:rw
      - ./services/cac-orchestrator/src:/app/src
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "3001", "--reload"]

  # reflection-engine: base compose left it on the default network so it could
  # not resolve `postgres` (DSN failed -> db_available=false). Put it on
  # agent-net and point the LLM at the DGX. Bind-mount src for hot-reload.
  reflection-engine:
    networks: [agent-net]
    environment:
      VLLM_LARGE_URL: ${VLLM_LARGE_URL:-http://nginx:8080/v1}
      VLLM_LARGE_MODEL: ${VLLM_LARGE_MODEL:-qwen-large}
      LLM_API_KEY: ${LLM_API_KEY:-}
    volumes:
      - ./services/reflection-engine/src:/app/src
      - ./obsidian-vault:/vault:rw
