<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proposal Rejected</title>
</head>
<body style="margin:0;padding:0;background:#f4f6f8;font-family:Arial,Helvetica,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:600px;margin:40px auto;background:#ffffff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);">
    <tr>
      <td style="background:#dc2626;padding:24px 32px;">
        <h1 style="color:#ffffff;margin:0;font-size:20px;">Proposal Rejected</h1>
      </td>
    </tr>
    <tr>
      <td style="padding:32px;">
        <p style="color:#374151;font-size:16px;line-height:1.6;margin:0 0 16px;">
          Proposal <strong>{{ proposal_id }}</strong> has been rejected.
        </p>

        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#fef2f2;border-radius:6px;border-left:4px solid #dc2626;margin:0 0 16px;">
          <tr>
            <td style="padding:16px 20px;">
              <p style="color:#6b7280;font-size:13px;margin:0 0 4px;">Reason</p>
              <p style="color:#111827;font-size:14px;margin:0;">{{ reason }}</p>
            </td>
          </tr>
        </table>

        <p style="color:#6b7280;font-size:14px;line-height:1.6;margin:0;">
          The originating agent has been notified. The proposal will be archived for audit purposes.
        </p>
      </td>
    </tr>
  </table>
</body>
</html>
